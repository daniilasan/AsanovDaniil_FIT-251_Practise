name: .NET CI

on:
  push:
    branches: [ "main", "task*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Restore
        run: dotnet restore practice2026.sln
        
      - name: Build
        run: dotnet build practice2026.sln --no-restore
        
      - name: Test
        run: dotnet test practice2026.sln --no-build --verbosity normal